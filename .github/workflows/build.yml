name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run semgrep hook
        run: pre-commit run semgrep --all-files

  build:
    name: Build Android Release APK
    runs-on: ubuntu-latest
    needs: semgrep
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Verify version for tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: python .github/scripts/check-version.py

      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          printf '%s' "$SIGNING_KEY_BASE64" | base64 -d > "${GITHUB_WORKSPACE}/VidGrab/app/release.keystore"

      - name: Build release APK
        working-directory: VidGrab
        env:
          SIGNING_STORE_FILE: ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}/VidGrab/app/release.keystore', github.workspace) || '' }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v6
        with:
          name: release-apk
          path: VidGrab/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release APK
        uses: actions/download-artifact@v6
        with:
          name: release-apk
          path: ./apk

      - name: Print signing certificate fingerprint
        run: |
          keytool -printcert -jarfile ./apk/app-release.apk |
            sed -n 's/[[:space:]]*SHA256: //p' |
            tr -d ':' | tr '[:upper:]' '[:lower:]' > fingerprint.txt
          echo "Signing certificate SHA-256 fingerprint:"
          cat fingerprint.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: ./apk/app-release.apk
          generate_release_notes: true
