Summary: Download videos with yt-dlp
Description: |
    VidGrab is a self-contained Android app that downloads videos using
    yt-dlp. Paste a supported URL, tap Download, and the app saves the
    video to your device's Movies/VidGrab folder via a foreground service
    with progress notifications.

