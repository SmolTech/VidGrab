MaintainerNotes: |
    The app embeds Python via Chaquopy and bundles yt-dlp at build time.
    Chaquopy is MIT-licensed open source. yt-dlp is Unlicense. F-Droid's
    buildserver will need to fetch the yt-dlp wheel; this is handled by
    the Chaquopy plugin using its configured package repository.
